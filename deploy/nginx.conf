# Latestock Nginx 설정 (M0-6 / M5-1)
# 배치 위치: /etc/nginx/sites-available/latestock  → sites-enabled 심볼릭 링크
#
# 정적 프런트(apps/web/dist)를 서빙하고, /api/* 는 상시 Node 프로세스(:4000)로 프록시한다.

server {
    # 캠프 DNS API 터널(POST /v1/tunnels/hostnames)의 localPort 제약: 1024~65535만 허용되고
    # 80은 막혀 있어 8080을 쓴다. 외부 노출은 전부 cloudflared 터널이 처리하므로
    # 이 포트는 VM 로컬(127.0.0.1)에만 열려 있어도 충분하다.
    listen 127.0.0.1:8080;
    listen [::1]:8080;

    server_name latestock.gjtjwns06.madcamp-kaist.org _;

    root /var/www/latestock/web;
    index index.html;

    # API 리버스 프록시 → 상시 Node 프로세스
    location /api/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA 라우팅: 없는 경로는 index.html로 폴백
    location / {
        try_files $uri $uri/ /index.html;
    }
}
