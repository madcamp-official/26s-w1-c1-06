# Latestock Nginx 설정 (M0-6 / M5-1)
# 배치 위치: /etc/nginx/sites-available/latestock  → sites-enabled 심볼릭 링크
#
# 정적 프런트(apps/web/dist)를 서빙하고, /api/* 는 상시 Node 프로세스(:4000)로 프록시한다.

server {
    listen 80;
    listen [::]:80;

    # 지금은 IP로 접속. DNS 서브도메인 발급 후 교체:
    # server_name w1-c1-06.example.kaist.ac.kr;
    server_name 172.10.8.37 _;

    root /var/www/latestock/web;
    index index.html;

    # API 리버스 프록시 → 상시 Node 프로세스
    location /api/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA 라우팅: 없는 경로는 index.html로 폴백
    location / {
        try_files $uri $uri/ /index.html;
    }
}
